name: CI - Build & Publish Online Boutique

on:
  push:
    branches: [ "main" ]

jobs:
  build-images:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:

          - service: adservice
            context: ./src/adservice
            dockerfile: ./src/adservice/Dockerfile

          - service: currencyservice
            context: ./src/currencyservice
            dockerfile: ./src/currencyservice/Dockerfile

          - service: emailservice
            context: ./src/emailservice
            dockerfile: ./src/emailservice/Dockerfile

          - service: paymentservice
            context: ./src/paymentservice
            dockerfile: ./src/paymentservice/Dockerfile

          - service: productcatalogservice
            context: ./src/productcatalogservice
            dockerfile: ./src/productcatalogservice/Dockerfile

          - service: recommendationservice
            context: ./src/recommendationservice
            dockerfile: ./src/recommendationservice/Dockerfile

          - service: shippingservice
            context: ./src/shippingservice
            dockerfile: ./src/shippingservice/Dockerfile

          - service: shoppingassistantservice
            context: ./src/shoppingassistantservice
            dockerfile: ./src/shoppingassistantservice/Dockerfile

          - service: frontend
            context: ./src/frontend
            dockerfile: ./src/frontend/Dockerfile

          - service: checkoutservice
            context: ./src/checkoutservice
            dockerfile: ./src/checkoutservice/Dockerfile

          - service: cartservice
            context: ./src/cartservice/src
            dockerfile: ./src/cartservice/src/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Vault CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq
          curl -fsSL https://releases.hashicorp.com/vault/1.17.2/vault_1.17.2_linux_amd64.zip -o vault.zip
          unzip vault.zip
          sudo mv vault /usr/local/bin/vault

      - name: Read secrets from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          export DOCKER_USERNAME=$(vault kv get -field=username secret/ci/docker)
          export DOCKER_PASSWORD=$(vault kv get -field=password secret/ci/docker)
          echo "DOCKER_USERNAME=$DOCKER_USERNAME" >> $GITHUB_ENV
          echo "DOCKER_PASSWORD=$DOCKER_PASSWORD" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_USERNAME }}/online-boutique-${{ matrix.service }}:latest
            ${{ env.DOCKER_USERNAME }}/online-boutique-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/online-boutique-${{ matrix.service }}:latest
          cache-to: type=inline
